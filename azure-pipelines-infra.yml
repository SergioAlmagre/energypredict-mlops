name: energypredict-infra-cicd-$(Date:yyyyMMdd)$(Rev:.r)

trigger: none
pr: none

variables:
  - group: energypredict-shared
  - name: TERRAFORM_VERSION
    value: '1.9.8'

stages:
  - stage: Terraform_Plan_Dev
    displayName: Terraform Plan Dev
    jobs:
      - job: plan_dev
        pool:
          vmImage: ubuntu-22.04
        steps:
          - checkout: self

          - script: |
              set -euo pipefail
              sudo apt-get update -y
              sudo apt-get install -y unzip
              TF_ZIP="terraform_$(TERRAFORM_VERSION)_linux_amd64.zip"
              curl -fsSL "https://releases.hashicorp.com/terraform/$(TERRAFORM_VERSION)/${TF_ZIP}" -o "${TF_ZIP}"
              unzip -o "${TF_ZIP}"
              sudo mv terraform /usr/local/bin/terraform
              terraform version
            displayName: Install Terraform CLI

          - script: terraform fmt -check -recursive infra/terraform
            displayName: Terraform format check

          - script: |
              set -euo pipefail
              python3 -m pip install --upgrade pip
              python3 -m pip install checkov
              checkov -d infra/terraform --framework terraform --soft-fail --quiet
            displayName: IaC security scan (Checkov, advisory)

          - task: AzureCLI@2
            displayName: Terraform Init/Plan (dev)
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                cd infra/terraform/envs/dev
                test -f terraform.tfvars || { echo "Missing infra/terraform/envs/dev/terraform.tfvars in repo/agent. Add variables via secure method before running infra pipeline."; exit 1; }
                terraform init -input=false
                terraform validate
                terraform plan -input=false -var-file=terraform.tfvars -out tfplan

  - stage: Terraform_Apply_Dev
    displayName: Terraform Apply Dev
    dependsOn: Terraform_Plan_Dev
    jobs:
      - deployment: apply_dev
        environment: energypredict-dev-infra
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - script: |
                    set -euo pipefail
                    sudo apt-get update -y
                    sudo apt-get install -y unzip
                    TF_ZIP="terraform_$(TERRAFORM_VERSION)_linux_amd64.zip"
                    curl -fsSL "https://releases.hashicorp.com/terraform/$(TERRAFORM_VERSION)/${TF_ZIP}" -o "${TF_ZIP}"
                    unzip -o "${TF_ZIP}"
                    sudo mv terraform /usr/local/bin/terraform
                    terraform version
                  displayName: Install Terraform CLI

                - task: AzureCLI@2
                  displayName: Terraform Apply (dev)
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail
                      cd infra/terraform/envs/dev
                      test -f terraform.tfvars || { echo "Missing infra/terraform/envs/dev/terraform.tfvars in repo/agent. Add variables via secure method before running infra pipeline."; exit 1; }
                      terraform init -input=false
                      terraform apply -input=false -var-file=terraform.tfvars -auto-approve

  - stage: Terraform_Plan_Prod
    displayName: Terraform Plan Prod
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: plan_prod
        pool:
          vmImage: ubuntu-22.04
        steps:
          - checkout: self

          - script: |
              set -euo pipefail
              sudo apt-get update -y
              sudo apt-get install -y unzip
              TF_ZIP="terraform_$(TERRAFORM_VERSION)_linux_amd64.zip"
              curl -fsSL "https://releases.hashicorp.com/terraform/$(TERRAFORM_VERSION)/${TF_ZIP}" -o "${TF_ZIP}"
              unzip -o "${TF_ZIP}"
              sudo mv terraform /usr/local/bin/terraform
              terraform version
            displayName: Install Terraform CLI

          - script: terraform fmt -check -recursive infra/terraform
            displayName: Terraform format check

          - script: |
              set -euo pipefail
              python3 -m pip install --upgrade pip
              python3 -m pip install checkov
              checkov -d infra/terraform --framework terraform --soft-fail --quiet
            displayName: IaC security scan (Checkov, advisory)

          - task: AzureCLI@2
            displayName: Terraform Init/Plan (prod)
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                cd infra/terraform/envs/prod
                test -f terraform.tfvars || { echo "Missing infra/terraform/envs/prod/terraform.tfvars in repo/agent. Add variables via secure method before running infra pipeline."; exit 1; }
                terraform init -input=false
                terraform validate
                terraform plan -input=false -var-file=terraform.tfvars -out tfplan

  - stage: Terraform_Apply_Prod
    displayName: Terraform Apply Prod
    dependsOn: Terraform_Plan_Prod
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: apply_prod
        environment: energypredict-prod-infra
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - script: |
                    set -euo pipefail
                    sudo apt-get update -y
                    sudo apt-get install -y unzip
                    TF_ZIP="terraform_$(TERRAFORM_VERSION)_linux_amd64.zip"
                    curl -fsSL "https://releases.hashicorp.com/terraform/$(TERRAFORM_VERSION)/${TF_ZIP}" -o "${TF_ZIP}"
                    unzip -o "${TF_ZIP}"
                    sudo mv terraform /usr/local/bin/terraform
                    terraform version
                  displayName: Install Terraform CLI

                - task: AzureCLI@2
                  displayName: Terraform Apply (prod)
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail
                      cd infra/terraform/envs/prod
                      test -f terraform.tfvars || { echo "Missing infra/terraform/envs/prod/terraform.tfvars in repo/agent. Add variables via secure method before running infra pipeline."; exit 1; }
                      terraform init -input=false
                      terraform apply -input=false -var-file=terraform.tfvars -auto-approve
