name: energypredict-infra-cicd-$(Date:yyyyMMdd)$(Rev:.r)

trigger: none
pr: none

variables:
  - group: energypredict-shared
  - name: TERRAFORM_VERSION
    value: '1.9.8'

stages:
  - stage: Bootstrap_TFState
    displayName: Bootstrap Terraform Remote State
    jobs:
      - job: bootstrap_state
        pool:
          vmImage: ubuntu-22.04
        steps:
          - task: AzureCLI@2
            displayName: Ensure remote state resources exist
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                TF_STATE_RESOURCE_GROUP="${TF_STATE_RESOURCE_GROUP:-rg-energypredict-tfstate}"
                TF_STATE_LOCATION="${TF_STATE_LOCATION:-westeurope}"
                TF_STATE_STORAGE_ACCOUNT="${TF_STATE_STORAGE_ACCOUNT:-stenergypredicttfstate01}"
                TF_STATE_CONTAINER="${TF_STATE_CONTAINER:-tfstate}"

                az group create \
                  --name "$TF_STATE_RESOURCE_GROUP" \
                  --location "$TF_STATE_LOCATION" 1>/dev/null

                az storage account create \
                  --name "$TF_STATE_STORAGE_ACCOUNT" \
                  --resource-group "$TF_STATE_RESOURCE_GROUP" \
                  --location "$TF_STATE_LOCATION" \
                  --sku Standard_LRS \
                  --kind StorageV2 \
                  --min-tls-version TLS1_2 \
                  --allow-blob-public-access false 1>/dev/null

                ACCOUNT_KEY="$(az storage account keys list \
                  --resource-group "$TF_STATE_RESOURCE_GROUP" \
                  --account-name "$TF_STATE_STORAGE_ACCOUNT" \
                  --query '[0].value' -o tsv)"

                az storage container create \
                  --name "$TF_STATE_CONTAINER" \
                  --account-name "$TF_STATE_STORAGE_ACCOUNT" \
                  --account-key "$ACCOUNT_KEY" \
                  --public-access off 1>/dev/null

  - stage: Terraform_Plan_Dev
    displayName: Terraform Plan Dev
    dependsOn: Bootstrap_TFState
    jobs:
      - job: plan_dev
        pool:
          vmImage: ubuntu-22.04
        steps:
          - checkout: self

          - script: |
              set -euo pipefail
              sudo apt-get update -y
              sudo apt-get install -y unzip
              TF_ZIP="terraform_$(TERRAFORM_VERSION)_linux_amd64.zip"
              curl -fsSL "https://releases.hashicorp.com/terraform/$(TERRAFORM_VERSION)/${TF_ZIP}" -o "${TF_ZIP}"
              unzip -o "${TF_ZIP}"
              sudo mv terraform /usr/local/bin/terraform
              terraform version
            displayName: Install Terraform CLI

          - script: terraform fmt -check -recursive infra/terraform
            displayName: Terraform format check

          - script: |
              set -euo pipefail
              python3 -m pip install --upgrade pip
              python3 -m pip install checkov
              checkov -d infra/terraform --framework terraform --soft-fail --quiet
            displayName: IaC security scan (Checkov, advisory)

          - task: AzureCLI@2
            displayName: Terraform Init/Plan (dev)
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                cd infra/terraform/envs/dev
                TF_STATE_RESOURCE_GROUP="${TF_STATE_RESOURCE_GROUP:-rg-energypredict-tfstate}"
                TF_STATE_STORAGE_ACCOUNT="${TF_STATE_STORAGE_ACCOUNT:-stenergypredicttfstate01}"
                TF_STATE_CONTAINER="${TF_STATE_CONTAINER:-tfstate}"
                TF_STATE_KEY_DEV="${TF_STATE_KEY_DEV:-dev.terraform.tfstate}"
                if [ -n "${TFVARS_DEV_B64:-}" ]; then
                  echo "$TFVARS_DEV_B64" | base64 -d > terraform.tfvars
                fi
                test -f terraform.tfvars || { echo "Missing infra/terraform/envs/dev/terraform.tfvars in repo/agent. Add variables via secure method before running infra pipeline."; exit 1; }
                ACCOUNT_KEY="$(az storage account keys list \
                  --resource-group "${TF_STATE_RESOURCE_GROUP}" \
                  --account-name "${TF_STATE_STORAGE_ACCOUNT}" \
                  --query '[0].value' -o tsv)"
                terraform init -input=false -reconfigure \
                  -backend-config="resource_group_name=${TF_STATE_RESOURCE_GROUP}" \
                  -backend-config="storage_account_name=${TF_STATE_STORAGE_ACCOUNT}" \
                  -backend-config="container_name=${TF_STATE_CONTAINER}" \
                  -backend-config="key=${TF_STATE_KEY_DEV}" \
                  -backend-config="access_key=${ACCOUNT_KEY}"
                terraform validate
                terraform plan -input=false -var-file=terraform.tfvars -out tfplan

  - stage: Terraform_Apply_Dev
    displayName: Terraform Apply Dev
    dependsOn: Terraform_Plan_Dev
    jobs:
      - deployment: apply_dev
        environment: energypredict-dev-infra
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - script: |
                    set -euo pipefail
                    sudo apt-get update -y
                    sudo apt-get install -y unzip
                    TF_ZIP="terraform_$(TERRAFORM_VERSION)_linux_amd64.zip"
                    curl -fsSL "https://releases.hashicorp.com/terraform/$(TERRAFORM_VERSION)/${TF_ZIP}" -o "${TF_ZIP}"
                    unzip -o "${TF_ZIP}"
                    sudo mv terraform /usr/local/bin/terraform
                    terraform version
                  displayName: Install Terraform CLI

                - task: AzureCLI@2
                  displayName: Terraform Apply (dev)
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail
                      cd infra/terraform/envs/dev
                      TF_STATE_RESOURCE_GROUP="${TF_STATE_RESOURCE_GROUP:-rg-energypredict-tfstate}"
                      TF_STATE_STORAGE_ACCOUNT="${TF_STATE_STORAGE_ACCOUNT:-stenergypredicttfstate01}"
                      TF_STATE_CONTAINER="${TF_STATE_CONTAINER:-tfstate}"
                      TF_STATE_KEY_DEV="${TF_STATE_KEY_DEV:-dev.terraform.tfstate}"
                      if [ -n "${TFVARS_DEV_B64:-}" ]; then
                        echo "$TFVARS_DEV_B64" | base64 -d > terraform.tfvars
                      fi
                      test -f terraform.tfvars || { echo "Missing infra/terraform/envs/dev/terraform.tfvars in repo/agent. Add variables via secure method before running infra pipeline."; exit 1; }
                      ACCOUNT_KEY="$(az storage account keys list \
                        --resource-group "${TF_STATE_RESOURCE_GROUP}" \
                        --account-name "${TF_STATE_STORAGE_ACCOUNT}" \
                        --query '[0].value' -o tsv)"
                      terraform init -input=false -reconfigure \
                        -backend-config="resource_group_name=${TF_STATE_RESOURCE_GROUP}" \
                        -backend-config="storage_account_name=${TF_STATE_STORAGE_ACCOUNT}" \
                        -backend-config="container_name=${TF_STATE_CONTAINER}" \
                        -backend-config="key=${TF_STATE_KEY_DEV}" \
                        -backend-config="access_key=${ACCOUNT_KEY}"
                      terraform apply -input=false -var-file=terraform.tfvars -auto-approve

  - stage: Terraform_Plan_Prod
    displayName: Terraform Plan Prod
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: plan_prod
        pool:
          vmImage: ubuntu-22.04
        steps:
          - checkout: self

          - script: |
              set -euo pipefail
              sudo apt-get update -y
              sudo apt-get install -y unzip
              TF_ZIP="terraform_$(TERRAFORM_VERSION)_linux_amd64.zip"
              curl -fsSL "https://releases.hashicorp.com/terraform/$(TERRAFORM_VERSION)/${TF_ZIP}" -o "${TF_ZIP}"
              unzip -o "${TF_ZIP}"
              sudo mv terraform /usr/local/bin/terraform
              terraform version
            displayName: Install Terraform CLI

          - script: terraform fmt -check -recursive infra/terraform
            displayName: Terraform format check

          - script: |
              set -euo pipefail
              python3 -m pip install --upgrade pip
              python3 -m pip install checkov
              checkov -d infra/terraform --framework terraform --soft-fail --quiet
            displayName: IaC security scan (Checkov, advisory)

          - task: AzureCLI@2
            displayName: Terraform Init/Plan (prod)
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                cd infra/terraform/envs/prod
                TF_STATE_RESOURCE_GROUP="${TF_STATE_RESOURCE_GROUP:-rg-energypredict-tfstate}"
                TF_STATE_STORAGE_ACCOUNT="${TF_STATE_STORAGE_ACCOUNT:-stenergypredicttfstate01}"
                TF_STATE_CONTAINER="${TF_STATE_CONTAINER:-tfstate}"
                TF_STATE_KEY_PROD="${TF_STATE_KEY_PROD:-prod.terraform.tfstate}"
                if [ -n "${TFVARS_PROD_B64:-}" ]; then
                  echo "$TFVARS_PROD_B64" | base64 -d > terraform.tfvars
                fi
                test -f terraform.tfvars || { echo "Missing infra/terraform/envs/prod/terraform.tfvars in repo/agent. Add variables via secure method before running infra pipeline."; exit 1; }
                ACCOUNT_KEY="$(az storage account keys list \
                  --resource-group "${TF_STATE_RESOURCE_GROUP}" \
                  --account-name "${TF_STATE_STORAGE_ACCOUNT}" \
                  --query '[0].value' -o tsv)"
                terraform init -input=false -reconfigure \
                  -backend-config="resource_group_name=${TF_STATE_RESOURCE_GROUP}" \
                  -backend-config="storage_account_name=${TF_STATE_STORAGE_ACCOUNT}" \
                  -backend-config="container_name=${TF_STATE_CONTAINER}" \
                  -backend-config="key=${TF_STATE_KEY_PROD}" \
                  -backend-config="access_key=${ACCOUNT_KEY}"
                terraform validate
                terraform plan -input=false -var-file=terraform.tfvars -out tfplan

  - stage: Terraform_Apply_Prod
    displayName: Terraform Apply Prod
    dependsOn: Terraform_Plan_Prod
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: apply_prod
        environment: energypredict-prod-infra
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - script: |
                    set -euo pipefail
                    sudo apt-get update -y
                    sudo apt-get install -y unzip
                    TF_ZIP="terraform_$(TERRAFORM_VERSION)_linux_amd64.zip"
                    curl -fsSL "https://releases.hashicorp.com/terraform/$(TERRAFORM_VERSION)/${TF_ZIP}" -o "${TF_ZIP}"
                    unzip -o "${TF_ZIP}"
                    sudo mv terraform /usr/local/bin/terraform
                    terraform version
                  displayName: Install Terraform CLI

                - task: AzureCLI@2
                  displayName: Terraform Apply (prod)
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail
                      cd infra/terraform/envs/prod
                      TF_STATE_RESOURCE_GROUP="${TF_STATE_RESOURCE_GROUP:-rg-energypredict-tfstate}"
                      TF_STATE_STORAGE_ACCOUNT="${TF_STATE_STORAGE_ACCOUNT:-stenergypredicttfstate01}"
                      TF_STATE_CONTAINER="${TF_STATE_CONTAINER:-tfstate}"
                      TF_STATE_KEY_PROD="${TF_STATE_KEY_PROD:-prod.terraform.tfstate}"
                      if [ -n "${TFVARS_PROD_B64:-}" ]; then
                        echo "$TFVARS_PROD_B64" | base64 -d > terraform.tfvars
                      fi
                      test -f terraform.tfvars || { echo "Missing infra/terraform/envs/prod/terraform.tfvars in repo/agent. Add variables via secure method before running infra pipeline."; exit 1; }
                      ACCOUNT_KEY="$(az storage account keys list \
                        --resource-group "${TF_STATE_RESOURCE_GROUP}" \
                        --account-name "${TF_STATE_STORAGE_ACCOUNT}" \
                        --query '[0].value' -o tsv)"
                      terraform init -input=false -reconfigure \
                        -backend-config="resource_group_name=${TF_STATE_RESOURCE_GROUP}" \
                        -backend-config="storage_account_name=${TF_STATE_STORAGE_ACCOUNT}" \
                        -backend-config="container_name=${TF_STATE_CONTAINER}" \
