services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: energypredict
      POSTGRES_USER: energypredict
      POSTGRES_PASSWORD: energypredict
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://energypredict:energypredict@postgres:5432/energypredict
      JWT_SECRET_KEY: local-dev-secret
      MLFLOW_TRACKING_URI: local://artifacts/mlflow
      TRAINING_MODE: local
    ports:
      - "8000:8000"
    depends_on:
      - postgres

volumes:
  postgres-data:
