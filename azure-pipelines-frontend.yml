name: energypredict-frontend-cicd-$(Date:yyyyMMdd)$(Rev:.r)

trigger:
  branches:
    include:
      - main
      - dev

pr:
  branches:
    include:
      - main
      - dev

variables:
  - group: energypredict-shared

stages:
  - stage: Validate_Frontend
    displayName: Validate Frontend Portal
    jobs:
      - job: validate
        pool:
          vmImage: ubuntu-22.04
        steps:
          - checkout: self

          - script: |
              set -euo pipefail
              test -f frontend/simulator-portal/index.html
              test -f frontend/simulator-portal/staticwebapp.config.json
              test -f frontend/simulator-portal/config.template.js
            displayName: Validate static portal files

  - stage: Deploy_Dev
    displayName: Deploy Frontend Dev
    dependsOn: Validate_Frontend
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/dev'))
    jobs:
      - deployment: deploy_frontend_dev
        displayName: Deploy static portal to SWA Dev
        environment: energypredict-frontend-dev
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: Prepare Dev frontend config and token
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail

                      sed \
                        -e "s|__API_BASE_URL__|$(FRONTEND_DEV_API_BASE_URL)|g" \
                        -e "s|__APP_ENV__|dev|g" \
                        frontend/simulator-portal/config.template.js > frontend/simulator-portal/config.js

                      SWA_TOKEN=$(az staticwebapp secrets list \
                        --name $(STATIC_WEB_APP_DEV_NAME) \
                        --resource-group $(STATIC_WEB_APP_DEV_RESOURCE_GROUP) \
                        --query properties.apiKey -o tsv)

                      echo "##vso[task.setvariable variable=SWA_TOKEN;issecret=true]$SWA_TOKEN"

                - task: AzureStaticWebApp@0
                  displayName: Deploy static portal (dev)
                  inputs:
                    azure_static_web_apps_api_token: $(SWA_TOKEN)
                    app_location: "frontend/simulator-portal"
                    output_location: ""
                    skip_app_build: true

  - stage: Deploy_Prod
    displayName: Deploy Frontend Prod
    dependsOn: Validate_Frontend
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: deploy_frontend_prod
        displayName: Deploy static portal to SWA Prod
        environment: energypredict-frontend-prod
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: Prepare Prod frontend config and token
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail

                      sed \
                        -e "s|__API_BASE_URL__|$(FRONTEND_PROD_API_BASE_URL)|g" \
                        -e "s|__APP_ENV__|prod|g" \
                        frontend/simulator-portal/config.template.js > frontend/simulator-portal/config.js

                      SWA_TOKEN=$(az staticwebapp secrets list \
                        --name $(STATIC_WEB_APP_PROD_NAME) \
                        --resource-group $(STATIC_WEB_APP_PROD_RESOURCE_GROUP) \
                        --query properties.apiKey -o tsv)

                      echo "##vso[task.setvariable variable=SWA_TOKEN;issecret=true]$SWA_TOKEN"

                - task: AzureStaticWebApp@0
                  displayName: Deploy static portal (prod)
                  inputs:
                    azure_static_web_apps_api_token: $(SWA_TOKEN)
                    app_location: "frontend/simulator-portal"
                    output_location: ""
                    skip_app_build: true
