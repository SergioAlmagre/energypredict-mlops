apiVersion: v1
kind: ConfigMap
metadata:
  name: energypredict-config
data:
  APP_NAME: "EnergyPredict MLOps API"
  ENVIRONMENT: "dev"
  API_V1_PREFIX: "/api/v1"
  CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:5500"
  LOG_LEVEL: "INFO"
  MODEL_STAGE: "staging"
  MLFLOW_TRACKING_URI: "databricks"
  MLFLOW_REGISTRY_URI: "databricks-uc"
  MLFLOW_EXPERIMENT_NAME: "energypredict-training"
  MLFLOW_MODEL_NAME: "asset_failure_classifier"
  MLFLOW_REGISTER_MODEL: "true"
  MLFLOW_UC_CATALOG: "energypredict"
  MLFLOW_UC_SCHEMA: "mlops"
  MLFLOW_REGISTERED_MODEL_NAME: "energypredict.mlops.asset_failure_classifier"
  MODEL_REGISTRY_BACKEND: "blob"
  MODEL_ARTIFACT_BACKEND: "blob"
  BLOB_MODELS_CONTAINER: "models"
  BLOB_REGISTRY_CONTAINER: "registry"
  BLOB_PROCESSED_CONTAINER: "processed"
  TRAINING_MODE: "k8s_job"
  K8S_NAMESPACE: "energypredict"
  K8S_TRAINING_JOB_IMAGE: "energypredict-training:latest"
  K8S_TRAINING_JOB_SERVICE_ACCOUNT: "energypredict-training"
  K8S_CONFIG_MAP_NAME: "energypredict-config"
  K8S_SECRET_NAME: "energypredict-secrets"
  MODEL_RELOAD_POLL_INTERVAL_SECONDS: "60"
  API_INTERNAL_BASE_URL: "http://energypredict-api/api/v1"
