apiVersion: apps/v1
kind: Deployment
metadata:
  name: energypredict-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: energypredict-api
  template:
    metadata:
      labels:
        app: energypredict-api
    spec:
      containers:
        - name: api
          image: energypredict-api:latest
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: 8000
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: energypredict-api
spec:
  selector:
    app: energypredict-api
  ports:
    - port: 80
      targetPort: 8000
