apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: energypredict-training-launcher
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: energypredict-training-launcher
subjects:
  - kind: ServiceAccount
    name: energypredict-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: energypredict-training-launcher
