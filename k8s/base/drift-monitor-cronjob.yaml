apiVersion: batch/v1
kind: CronJob
metadata:
  name: energypredict-drift-monitor
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app: energypredict-drift-monitor
            azure.workload.identity/use: "true"
        spec:
          restartPolicy: Never
          serviceAccountName: energypredict-training
          containers:
            - name: drift-monitor
              image: energypredictacr.azurecr.io/energypredict-api:latest
              imagePullPolicy: Always
              command: ["python", "-m", "app.jobs.drift_monitor"]
              envFrom:
                - configMapRef:
                    name: energypredict-config
                - secretRef:
                    name: energypredict-secrets
              env:
                - name: DRIFT_TRIGGER_RETRAINING
                  value: "true"
              volumeMounts:
                - name: secrets-store-inline
                  mountPath: /mnt/secrets-store
                  readOnly: true
          volumes:
            - name: secrets-store-inline
              csi:
                driver: secrets-store.csi.k8s.io
                readOnly: true
                volumeAttributes:
                  secretProviderClass: energypredict-kv-secrets
