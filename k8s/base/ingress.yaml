apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: energypredict-api
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: api.energypredict.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: energypredict-api
                port:
                  number: 80
