  LOG_LEVEL: "INFO"
  MODEL_STAGE: "production"
  MLFLOW_TRACKING_URI: "databricks"
  MLFLOW_REGISTRY_URI: "databricks-uc"
  K8S_NAMESPACE: "energypredict-prod"
