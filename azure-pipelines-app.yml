name: energypredict-app-cicd-$(Date:yyyyMMdd)$(Rev:.r)

trigger:
  branches:
    include:
      - main
      - dev

pr:
  branches:
    include:
      - main
      - dev

variables:
  - name: IMAGE_NAME
    value: energypredict-api
  - group: energypredict-shared

stages:
  - stage: CI
    displayName: CI (Lint + Test + Build + Push)
    jobs:
      - job: ci
        displayName: Run CI checks
        pool:
          vmImage: ubuntu-22.04
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.11'

          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt
              pip install ruff
              pip install bandit pip-audit
            displayName: Install dependencies

          - script: python -m ruff check app tests
            displayName: Lint

          - script: python -m pytest -q
            displayName: Tests

          - script: |
              set -euo pipefail
              if python -c "from pathlib import Path; import sys; t=Path('tests'); sys.exit(0 if t.exists() and any('@pytest.mark.integration' in p.read_text(encoding='utf-8', errors='ignore') for p in t.rglob('*.py')) else 1)"
              then
                python -m pytest -q -m integration
              else
                echo "No integration tests found with @pytest.mark.integration. Skipping."
              fi
            displayName: Integration tests (if present)

          - script: python -m bandit -r app -lll
            displayName: Security SAST (Bandit)

          - script: python -m pip_audit -r requirements.txt
            displayName: Dependency audit (pip-audit, advisory)
            continueOnError: true

          - script: docker build -t $(IMAGE_NAME):ci-$(Build.SourceVersion) .
            displayName: Docker build (validation)

          - task: AzureCLI@2
            displayName: Build and push image to ACR (single artifact)
            condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                az acr login --name $(ACR_NAME)
                IMAGE_TAG=$(Build.SourceVersion)
                FULL_IMAGE=$(ACR_NAME).azurecr.io/$(IMAGE_NAME):$IMAGE_TAG
                docker build -t "$FULL_IMAGE" .
                docker push "$FULL_IMAGE"

  - stage: Deploy_Dev
    displayName: Deploy Dev
    dependsOn: CI
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/dev'))
    jobs:
      - deployment: deploy_dev
        displayName: Deploy to AKS Dev
        environment: energypredict-dev
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: AKS deploy (dev)
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail
                      debug_rollout() {
                        local ns="$1"
                        local deploy="$2"
                        echo "===== Deployment diagnostics (${ns}/${deploy}) ====="
                        kubectl get deploy -n "$ns" "$deploy" -o wide || true
                        kubectl get rs -n "$ns" -l app=energypredict-api -o wide || true
                        kubectl get pods -n "$ns" -l app=energypredict-api -o wide || true
                        kubectl describe deploy -n "$ns" "$deploy" || true
                        local pod
                        pod="$(kubectl get pods -n "$ns" -l app=energypredict-api -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)"
                        if [ -n "${pod}" ]; then
                          kubectl describe pod -n "$ns" "$pod" || true
                          kubectl logs -n "$ns" "$pod" --tail=200 || true
                          kubectl logs -n "$ns" "$pod" --previous --tail=200 || true
                        fi
                        kubectl get events -n "$ns" --sort-by=.metadata.creationTimestamp | tail -n 40 || true
                      }

                      DEV_UAMI_ID="$(az identity list --query "[?clientId=='$(AKS_WORKLOAD_IDENTITY_CLIENT_ID_DEV)'] | [0].id" -o tsv)"
                      if [ -z "${DEV_UAMI_ID}" ]; then
                        echo "ERROR: AKS_WORKLOAD_IDENTITY_CLIENT_ID_DEV ($(AKS_WORKLOAD_IDENTITY_CLIENT_ID_DEV)) not found in this subscription/tenant."
                        echo "Update Variable Group 'energypredict-shared' with the current Terraform output identity_client_id for dev."
                        exit 1
                      fi
                      echo "Using workload identity (dev): ${DEV_UAMI_ID}"

                      sed -i "s|REPLACE_ME_CLIENT_ID|$(AKS_WORKLOAD_IDENTITY_CLIENT_ID_DEV)|g" k8s/overlays/dev/patch-serviceaccount.yaml
                      sed -i "s|REPLACE_ME_CLIENT_ID|$(AKS_WORKLOAD_IDENTITY_CLIENT_ID_DEV)|g" k8s/overlays/dev/patch-secretproviderclass.yaml
                      sed -i "s|REPLACE_ME_KEYVAULT_NAME|$(KEY_VAULT_NAME_DEV)|g" k8s/overlays/dev/patch-secretproviderclass.yaml
                      sed -i "s|REPLACE_ME_TENANT_ID|$(AZURE_TENANT_ID)|g" k8s/overlays/dev/patch-secretproviderclass.yaml
                      az aks get-credentials --resource-group $(AKS_DEV_RESOURCE_GROUP) --name $(AKS_DEV_CLUSTER_NAME) --overwrite-existing
                      kubectl apply -k k8s/overlays/dev
                      if ! bash scripts/prepare_public_api_endpoint.sh dev; then
                        echo "WARNING: Public endpoint preparation failed in dev. Continuing backend rollout."
                      fi
                      kubectl set image deployment/energypredict-api-dev api=$(ACR_NAME).azurecr.io/$(IMAGE_NAME):$(Build.SourceVersion) -n energypredict-dev
                      kubectl set env deployment/energypredict-api-dev CORS_ALLOWED_ORIGINS=$(CORS_ALLOWED_ORIGINS_DEV) -n energypredict-dev
                      echo "Public API endpoint (dev): ${PUBLIC_API_BASE_URL:-not-set}"
                      if ! kubectl rollout status deployment/energypredict-api-dev -n energypredict-dev --timeout=300s; then
                        debug_rollout "energypredict-dev" "energypredict-api-dev"
                        exit 1
                      fi

  - stage: Deploy_Prod
    displayName: Deploy Prod
    dependsOn: CI
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: deploy_prod
        displayName: Deploy to AKS Prod
        environment: energypredict-prod
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: AKS deploy (prod)
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail
                      debug_rollout() {
                        local ns="$1"
                        local deploy="$2"
                        echo "===== Deployment diagnostics (${ns}/${deploy}) ====="
                        kubectl get deploy -n "$ns" "$deploy" -o wide || true
                        kubectl get rs -n "$ns" -l app=energypredict-api -o wide || true
                        kubectl get pods -n "$ns" -l app=energypredict-api -o wide || true
                        kubectl describe deploy -n "$ns" "$deploy" || true
                        local pod
                        pod="$(kubectl get pods -n "$ns" -l app=energypredict-api -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)"
                        if [ -n "${pod}" ]; then
                          kubectl describe pod -n "$ns" "$pod" || true
                          kubectl logs -n "$ns" "$pod" --tail=200 || true
                          kubectl logs -n "$ns" "$pod" --previous --tail=200 || true
                        fi
                        kubectl get events -n "$ns" --sort-by=.metadata.creationTimestamp | tail -n 40 || true
                      }

                      PROD_UAMI_ID="$(az identity list --query "[?clientId=='$(AKS_WORKLOAD_IDENTITY_CLIENT_ID_PROD)'] | [0].id" -o tsv)"
                      if [ -z "${PROD_UAMI_ID}" ]; then
                        echo "ERROR: AKS_WORKLOAD_IDENTITY_CLIENT_ID_PROD ($(AKS_WORKLOAD_IDENTITY_CLIENT_ID_PROD)) not found in this subscription/tenant."
                        echo "Update Variable Group 'energypredict-shared' with the current Terraform output identity_client_id for prod."
                        exit 1
                      fi
                      echo "Using workload identity (prod): ${PROD_UAMI_ID}"

                      sed -i "s|REPLACE_ME_CLIENT_ID|$(AKS_WORKLOAD_IDENTITY_CLIENT_ID_PROD)|g" k8s/overlays/prod/patch-serviceaccount.yaml
                      sed -i "s|REPLACE_ME_CLIENT_ID|$(AKS_WORKLOAD_IDENTITY_CLIENT_ID_PROD)|g" k8s/overlays/prod/patch-secretproviderclass.yaml
                      sed -i "s|REPLACE_ME_KEYVAULT_NAME|$(KEY_VAULT_NAME_PROD)|g" k8s/overlays/prod/patch-secretproviderclass.yaml
                      sed -i "s|REPLACE_ME_TENANT_ID|$(AZURE_TENANT_ID)|g" k8s/overlays/prod/patch-secretproviderclass.yaml
                      az aks get-credentials --resource-group $(AKS_PROD_RESOURCE_GROUP) --name $(AKS_PROD_CLUSTER_NAME) --overwrite-existing
                      kubectl apply -k k8s/overlays/prod
                      if ! bash scripts/prepare_public_api_endpoint.sh prod; then
                        echo "WARNING: Public endpoint preparation failed in prod. Continuing backend rollout."
                      fi
                      kubectl set image deployment/energypredict-api-prod api=$(ACR_NAME).azurecr.io/$(IMAGE_NAME):$(Build.SourceVersion) -n energypredict-prod
                      kubectl set env deployment/energypredict-api-prod CORS_ALLOWED_ORIGINS=$(CORS_ALLOWED_ORIGINS_PROD) -n energypredict-prod
                      echo "Public API endpoint (prod): ${PUBLIC_API_BASE_URL:-not-set}"
                      if ! kubectl rollout status deployment/energypredict-api-prod -n energypredict-prod --timeout=420s; then
                        debug_rollout "energypredict-prod" "energypredict-api-prod"
                        exit 1
                      fi
