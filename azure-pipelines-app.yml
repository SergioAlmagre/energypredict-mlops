name: energypredict-app-cicd-$(Date:yyyyMMdd)$(Rev:.r)

trigger:
  branches:
    include:
      - main
      - dev

pr:
  branches:
    include:
      - main
      - dev

variables:
  - name: IMAGE_NAME
    value: energypredict-api
  - name: TRAINING_IMAGE_NAME
    value: energypredict-training
  - name: DATA_PROCESSOR_IMAGE_NAME
    value: energypredict-data-processor
  - group: energypredict-shared

stages:
  - stage: CI
    displayName: CI (Lint + Test + Build + Push)
    jobs:
      - job: ci
        displayName: Run CI checks
        pool:
          vmImage: ubuntu-22.04
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.11'

          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt
              pip install ruff
              pip install bandit pip-audit
            displayName: Install dependencies

          - script: python -m ruff check app tests
            displayName: Lint

          - script: python -m pytest -q
            displayName: Tests

          - script: |
              set -euo pipefail
              if python -c "from pathlib import Path; import sys; t=Path('tests'); sys.exit(0 if t.exists() and any('@pytest.mark.integration' in p.read_text(encoding='utf-8', errors='ignore') for p in t.rglob('*.py')) else 1)"
              then
                python -m pytest -q -m integration
              else
                echo "No integration tests found with @pytest.mark.integration. Skipping."
              fi
            displayName: Integration tests (if present)

          - script: python -m bandit -r app -lll
            displayName: Security SAST (Bandit)

          - script: python -m pip_audit -r requirements.txt
            displayName: Dependency audit (pip-audit, advisory)
            continueOnError: true

          - script: |
              docker build -t $(IMAGE_NAME):ci-$(Build.SourceVersion) .
              docker build -f training-job/Dockerfile -t $(TRAINING_IMAGE_NAME):ci-$(Build.SourceVersion) .
              docker build -f data-processor/Dockerfile -t $(DATA_PROCESSOR_IMAGE_NAME):ci-$(Build.SourceVersion) .
            displayName: Docker build images (validation)

          - task: AzureCLI@2
            displayName: Build and push images to ACR
            condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                az acr login --name $(ACR_NAME)
                IMAGE_TAG=$(Build.SourceVersion)
                for item in \
                  "$(IMAGE_NAME)|Dockerfile|." \
                  "$(TRAINING_IMAGE_NAME)|training-job/Dockerfile|." \
                  "$(DATA_PROCESSOR_IMAGE_NAME)|data-processor/Dockerfile|."
                do
                  IFS='|' read -r name dockerfile context <<< "$item"
                  full_image="$(ACR_NAME).azurecr.io/${name}:${IMAGE_TAG}"
                  docker build -f "$dockerfile" -t "$full_image" "$context"
                  docker push "$full_image"
                done

  - stage: Deploy_Dev
    displayName: Deploy Dev
    dependsOn: CI
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/dev'))
    jobs:
      - deployment: deploy_dev
        displayName: Deploy to AKS Dev
        environment: energypredict-dev
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: AKS deploy (dev)
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail
                      debug_rollout() {
                        local ns="$1"
                        local deploy="$2"
                        echo "===== Deployment diagnostics (${ns}/${deploy}) ====="
                        kubectl get deploy -n "$ns" "$deploy" -o wide || true
                        kubectl get rs -n "$ns" -l app=energypredict-api -o wide || true
                        kubectl get pods -n "$ns" -l app=energypredict-api -o wide || true
                        kubectl describe deploy -n "$ns" "$deploy" || true
                        local pod
                        pod="$(kubectl get pods -n "$ns" -l app=energypredict-api -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)"
                        if [ -n "${pod}" ]; then
                          kubectl describe pod -n "$ns" "$pod" || true
                          kubectl logs -n "$ns" "$pod" --tail=200 || true
                          kubectl logs -n "$ns" "$pod" --previous --tail=200 || true
                        fi
                        kubectl get events -n "$ns" --sort-by=.metadata.creationTimestamp | tail -n 40 || true
                      }

                      run_smoke_tests() {
                        local ns="$1"
                        local service_name="$2"
                        local local_port="$3"

                        local pf_pid=""
                        cleanup_pf() {
                          if [ -n "${pf_pid}" ]; then
                            kill "${pf_pid}" >/dev/null 2>&1 || true
                            wait "${pf_pid}" >/dev/null 2>&1 || true
                          fi
                        }
                        trap cleanup_pf RETURN

                        kubectl -n "${ns}" port-forward "svc/${service_name}" "${local_port}:80" >/tmp/pf-${ns}.log 2>&1 &
                        pf_pid=$!
                        sleep 4
                        if ! kill -0 "${pf_pid}" >/dev/null 2>&1; then
                          echo "ERROR: port-forward failed for ${ns}/${service_name}"
                          cat /tmp/pf-${ns}.log || true
                          return 1
                        fi

                        local api_base="http://127.0.0.1:${local_port}/api/v1"
                        local smoke_email="smoke.admin.${ns}@energypredictapp.com"
                        local smoke_password="SmokePass!123"

                        curl -fsS "${api_base}/health/live" >/dev/null
                        curl -fsS "${api_base}/health/ready" >/dev/null

                        curl -sS -o /tmp/smoke-register-${ns}.json -w "%{http_code}" \
                          -X POST "${api_base}/auth/register" \
                          -H "Content-Type: application/json" \
                          -d "{\"email\":\"${smoke_email}\",\"password\":\"${smoke_password}\",\"role\":\"admin\"}" | grep -Eq "^(200|201|400|409)$"

                        curl -fsS -o /tmp/smoke-login-${ns}.json \
                          -X POST "${api_base}/auth/login" \
                          -H "Content-Type: application/x-www-form-urlencoded" \
                          --data-urlencode "username=${smoke_email}" \
                          --data-urlencode "password=${smoke_password}"

                        local token
                        token="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8")).get("access_token",""))' "/tmp/smoke-login-${ns}.json")"
                        if [ -z "${token}" ]; then
                          echo "ERROR: smoke login did not return access_token"
                          cat /tmp/smoke-login-${ns}.json || true
                          return 1
                        fi

                        curl -fsS -H "Authorization: Bearer ${token}" "${api_base}/admin/risk-thresholds" >/dev/null
                        curl -fsS -H "Authorization: Bearer ${token}" "${api_base}/admin/simulation/status" >/dev/null
                        curl -fsS -H "Authorization: Bearer ${token}" "${api_base}/stream/latest?limit=5" >/dev/null
                        curl -fsS -H "Authorization: Bearer ${token}" "${api_base}/alerts/active?limit=5" >/dev/null

                        echo "Smoke tests passed for namespace ${ns}"
                      }

                      debug_public_endpoint() {
                        echo "===== Public endpoint diagnostics (prod) ====="
                        kubectl -n ingress-nginx get deploy,pods,svc,endpoints -o wide || true
                        kubectl -n ingress-nginx describe svc ingress-nginx-controller || true
                        kubectl -n ingress-nginx get events --sort-by=.metadata.creationTimestamp | tail -n 40 || true

                        kubectl -n energypredict-prod get ingress energypredict-api-prod -o wide || true
                        kubectl -n energypredict-prod describe ingress energypredict-api-prod || true
                        kubectl -n energypredict-prod get certificate,certificaterequest,order,challenge 2>/dev/null || true
                        kubectl -n energypredict-prod get events --sort-by=.metadata.creationTimestamp | tail -n 60 || true

                        kubectl -n cert-manager get pods -o wide 2>/dev/null || true
                        kubectl -n cert-manager logs deploy/cert-manager --tail=120 2>/dev/null || true
                      }

                      DEV_UAMI_ID="$(az identity list --query "[?clientId=='$(AKS_WORKLOAD_IDENTITY_CLIENT_ID_DEV)'] | [0].id" -o tsv)"
                      if [ -z "${DEV_UAMI_ID}" ]; then
                        echo "ERROR: AKS_WORKLOAD_IDENTITY_CLIENT_ID_DEV ($(AKS_WORKLOAD_IDENTITY_CLIENT_ID_DEV)) not found in this subscription/tenant."
                        echo "Update Variable Group 'energypredict-shared' with the current Terraform output identity_client_id for dev."
                        exit 1
                      fi
                      echo "Using workload identity (dev): ${DEV_UAMI_ID}"

                      for f in k8s/overlays/dev/patch-serviceaccount*.yaml; do
                        sed -i "s|REPLACE_ME_CLIENT_ID|$(AKS_WORKLOAD_IDENTITY_CLIENT_ID_DEV)|g" "$f"
                      done
                      sed -i "s|REPLACE_ME_CLIENT_ID|$(AKS_WORKLOAD_IDENTITY_CLIENT_ID_DEV)|g" k8s/overlays/dev/patch-secretproviderclass.yaml
                      sed -i "s|REPLACE_ME_KEYVAULT_NAME|$(KEY_VAULT_NAME_DEV)|g" k8s/overlays/dev/patch-secretproviderclass.yaml
                      sed -i "s|REPLACE_ME_TENANT_ID|$(AZURE_TENANT_ID)|g" k8s/overlays/dev/patch-secretproviderclass.yaml
                      wait_for_cluster_api() {
                        local fqdn="$1"
                        local max_attempts="${2:-18}"
                        local sleep_seconds="${3:-10}"
                        local attempt=1
                        while [ "${attempt}" -le "${max_attempts}" ]; do
                          if kubectl version --request-timeout=15s >/dev/null 2>&1; then
                            echo "AKS API reachable."
                            return 0
                          fi
                          echo "Waiting for AKS API connectivity (${attempt}/${max_attempts})..."
                          if [ -n "${fqdn}" ]; then
                            getent hosts "${fqdn}" || true
                          fi
                          sleep "${sleep_seconds}"
                          attempt=$((attempt + 1))
                        done
                        return 1
                      }

                      apply_overlay_with_retry() {
                        local overlay="$1"
                        local max_attempts="${2:-6}"
                        local sleep_seconds="${3:-15}"
                        local attempt=1
                        while [ "${attempt}" -le "${max_attempts}" ]; do
                          echo "Applying ${overlay} (${attempt}/${max_attempts})..."
                          if kubectl apply --validate=false -k "${overlay}"; then
                            return 0
                          fi
                          sleep "${sleep_seconds}"
                          attempt=$((attempt + 1))
                        done
                        return 1
                      }

                      az aks get-credentials --resource-group $(AKS_DEV_RESOURCE_GROUP) --name $(AKS_DEV_CLUSTER_NAME) --overwrite-existing
                      DEV_AKS_FQDN="$(az aks show --resource-group $(AKS_DEV_RESOURCE_GROUP) --name $(AKS_DEV_CLUSTER_NAME) --query fqdn -o tsv 2>/dev/null || true)"
                      if ! wait_for_cluster_api "${DEV_AKS_FQDN}" 18 10; then
                        echo "ERROR: AKS API not reachable after retries (dev)."
                        exit 1
                      fi
                      if ! apply_overlay_with_retry "k8s/overlays/dev" 6 15; then
                        echo "ERROR: kubectl apply failed after retries (dev)."
                        debug_rollout "energypredict-dev" "energypredict-api-dev"
                        exit 1
                      fi
                      if ! timeout 25m env ENABLE_HTTPS=true LETSENCRYPT_EMAIL='$(LETSENCRYPT_EMAIL)' INGRESS_NGINX_REPLICA_COUNT="${INGRESS_NGINX_REPLICA_COUNT_DEV:-1}" bash scripts/prepare_public_api_endpoint.sh dev; then
                        echo "WARNING: Public endpoint preparation failed in dev. Continuing backend rollout."
                      fi
                      API_IMAGE="$(ACR_NAME).azurecr.io/$(IMAGE_NAME):$(Build.SourceVersion)"
                      TRAINING_IMAGE="$(ACR_NAME).azurecr.io/$(TRAINING_IMAGE_NAME):$(Build.SourceVersion)"
                      DATA_PROCESSOR_IMAGE="$(ACR_NAME).azurecr.io/$(DATA_PROCESSOR_IMAGE_NAME):$(Build.SourceVersion)"
                      kubectl set image deployment/energypredict-api-dev api="${API_IMAGE}" -n energypredict-dev
                      kubectl set image deployment/energypredict-data-processor-dev data-processor="${DATA_PROCESSOR_IMAGE}" -n energypredict-dev
                      kubectl set image job/energypredict-training-template-dev training="${TRAINING_IMAGE}" -n energypredict-dev || true
                      kubectl set image cronjob/energypredict-drift-monitor-dev drift-monitor="${API_IMAGE}" -n energypredict-dev || true
                      DEV_EVENTHUB_FQ_NAMESPACE=""
                      if [ -n "${EVENTHUB_NAMESPACE_NAME_DEV:-}" ]; then
                        DEV_EVENTHUB_FQ_NAMESPACE="${EVENTHUB_NAMESPACE_NAME_DEV}.servicebus.windows.net"
                      fi
                      if [ -z "${MODEL_STORAGE_ACCOUNT_NAME_DEV:-}" ]; then
                        echo "ERROR: MODEL_STORAGE_ACCOUNT_NAME_DEV is required for cloud model artifacts/cache."
                        echo "Set it from Terraform output 'model_storage_account_name' in Variable Group 'energypredict-shared'."
                        exit 1
                      fi
                      if [ -z "${DATABRICKS_HOST_DEV:-}" ]; then
                        echo "ERROR: DATABRICKS_HOST_DEV is required for Databricks MLflow tracking."
                        echo "Example: https://adb-<workspace-id>.<region>.azuredatabricks.net"
                        exit 1
                      fi
                      kubectl set env configmap/energypredict-config-dev \
                        MLFLOW_TRACKING_URI=databricks \
                        MLFLOW_REGISTRY_URI=databricks-uc \
                        MLFLOW_REGISTER_MODEL=true \
                        MLFLOW_UC_CATALOG="${DATABRICKS_UC_CATALOG_DEV:-energypredict}" \
                        MLFLOW_UC_SCHEMA="${DATABRICKS_UC_SCHEMA_DEV:-mlops}" \
                        MLFLOW_REGISTERED_MODEL_NAME="${DATABRICKS_UC_MODEL_NAME_DEV:-energypredict.mlops.asset_failure_classifier}" \
                        MLFLOW_SYNC_PRODUCTION_ALIAS="${MLFLOW_SYNC_PRODUCTION_ALIAS_DEV:-false}" \
                        MLFLOW_PRODUCTION_ALIAS="${MLFLOW_PRODUCTION_ALIAS_DEV:-champion}" \
                        STREAM_INGESTION_ENABLED="${STREAM_INGESTION_ENABLED_DEV:-false}" \
                        API_SIMULATION_WORKER_ENABLED="${API_SIMULATION_WORKER_ENABLED_DEV:-false}" \
                        DRIFT_MONITOR_WINDOW_HOURS="${DRIFT_MONITOR_WINDOW_HOURS_DEV:-24}" \
                        DRIFT_MONITOR_MIN_SAMPLES="${DRIFT_MONITOR_MIN_SAMPLES_DEV:-30}" \
                        DRIFT_PSI_WARNING_THRESHOLD="${DRIFT_PSI_WARNING_THRESHOLD_DEV:-0.10}" \
                        DRIFT_PSI_RETRAIN_THRESHOLD="${DRIFT_PSI_RETRAIN_THRESHOLD_DEV:-0.25}" \
                        DRIFT_RETRAINING_ENABLED="${DRIFT_RETRAINING_ENABLED_DEV:-false}" \
                        DRIFT_RETRAINING_DATASET_URI="${DRIFT_RETRAINING_DATASET_URI_DEV:-azureblob://processed/latest/sensor_data.csv}" \
                        DRIFT_ALERT_WEBHOOK_URL="${DRIFT_ALERT_WEBHOOK_URL_DEV:-}" \
                        DATABRICKS_HOST="${DATABRICKS_HOST_DEV}" \
                        -n energypredict-dev
                      kubectl set env deployment/energypredict-api-dev \
                        CORS_ALLOWED_ORIGINS=$(CORS_ALLOWED_ORIGINS_DEV) \
                        STREAM_INGESTION_ENABLED="${STREAM_INGESTION_ENABLED_DEV:-false}" \
                        API_SIMULATION_WORKER_ENABLED="${API_SIMULATION_WORKER_ENABLED_DEV:-false}" \
                        PREDICTION_LOOP_INTERVAL_SECONDS="${PREDICTION_LOOP_INTERVAL_SECONDS:-10}" \
                        EVENTHUB_NAME="${EVENTHUB_NAME_DEV:-}" \
                        EVENTHUB_CONSUMER_GROUP="${EVENTHUB_CONSUMER_GROUP:-\$Default}" \
                        EVENTHUB_FQ_NAMESPACE=${DEV_EVENTHUB_FQ_NAMESPACE} \
                        MODEL_REGISTRY_BACKEND=blob \
                        MODEL_ARTIFACT_BACKEND=blob \
                        K8S_TRAINING_JOB_IMAGE="${TRAINING_IMAGE}" \
                        MLFLOW_TRACKING_URI=databricks \
                        MLFLOW_REGISTRY_URI=databricks-uc \
                        MLFLOW_REGISTER_MODEL=true \
                        MLFLOW_UC_CATALOG="${DATABRICKS_UC_CATALOG_DEV:-energypredict}" \
                        MLFLOW_UC_SCHEMA="${DATABRICKS_UC_SCHEMA_DEV:-mlops}" \
                        MLFLOW_REGISTERED_MODEL_NAME="${DATABRICKS_UC_MODEL_NAME_DEV:-energypredict.mlops.asset_failure_classifier}" \
                        DATABRICKS_HOST="${DATABRICKS_HOST_DEV}" \
                        LLM_PROVIDER="${LLM_PROVIDER:-disabled}" \
                        LLM_MODEL="${LLM_MODEL:-}" \
                        LLM_ENDPOINT="${LLM_ENDPOINT:-}" \
                        LLM_API_KEY="${LLM_API_KEY:-}" \
                        -n energypredict-dev
                      kubectl set env deployment/energypredict-data-processor-dev \
                        EVENTHUB_NAME="${EVENTHUB_NAME_DEV:-}" \
                        EVENTHUB_CONSUMER_GROUP="${EVENTHUB_CONSUMER_GROUP:-\$Default}" \
                        EVENTHUB_FQ_NAMESPACE=${DEV_EVENTHUB_FQ_NAMESPACE} \
                        MODEL_REGISTRY_BACKEND=blob \
                        MODEL_ARTIFACT_BACKEND=blob \
                        MLFLOW_TRACKING_URI=databricks \
                        MLFLOW_REGISTRY_URI=databricks-uc \
                        MLFLOW_REGISTER_MODEL=true \
                        MLFLOW_UC_CATALOG="${DATABRICKS_UC_CATALOG_DEV:-energypredict}" \
                        MLFLOW_UC_SCHEMA="${DATABRICKS_UC_SCHEMA_DEV:-mlops}" \
                        MLFLOW_REGISTERED_MODEL_NAME="${DATABRICKS_UC_MODEL_NAME_DEV:-energypredict.mlops.asset_failure_classifier}" \
                        DATABRICKS_HOST="${DATABRICKS_HOST_DEV}" \
                        -n energypredict-dev
                      echo "Public API endpoint (dev): ${PUBLIC_API_BASE_URL:-not-set}"
                      if ! kubectl rollout status deployment/energypredict-api-dev -n energypredict-dev --timeout=300s; then
                        debug_rollout "energypredict-dev" "energypredict-api-dev"
                        exit 1
                      fi
                      kubectl rollout status deployment/energypredict-data-processor-dev -n energypredict-dev --timeout=300s
                      run_smoke_tests "energypredict-dev" "energypredict-api-dev" "18080"

  - stage: Deploy_Prod
    displayName: Deploy Prod
    dependsOn: CI
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: deploy_prod
        displayName: Deploy to AKS Prod
        environment: energypredict-prod
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: AKS deploy (prod)
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail
                      debug_rollout() {
                        local ns="$1"
                        local deploy="$2"
                        echo "===== Deployment diagnostics (${ns}/${deploy}) ====="
                        kubectl get deploy -n "$ns" "$deploy" -o wide || true
                        kubectl get rs -n "$ns" -l app=energypredict-api -o wide || true
                        kubectl get pods -n "$ns" -l app=energypredict-api -o wide || true
                        kubectl describe deploy -n "$ns" "$deploy" || true
                        local pod
                        pod="$(kubectl get pods -n "$ns" -l app=energypredict-api -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)"
                        if [ -n "${pod}" ]; then
                          kubectl describe pod -n "$ns" "$pod" || true
                          kubectl logs -n "$ns" "$pod" --tail=200 || true
                          kubectl logs -n "$ns" "$pod" --previous --tail=200 || true
                        fi
                        kubectl get events -n "$ns" --sort-by=.metadata.creationTimestamp | tail -n 40 || true
                      }

                      run_smoke_tests() {
                        local ns="$1"
                        local service_name="$2"
                        local local_port="$3"

                        local pf_pid=""
                        cleanup_pf() {
                          if [ -n "${pf_pid}" ]; then
                            kill "${pf_pid}" >/dev/null 2>&1 || true
                            wait "${pf_pid}" >/dev/null 2>&1 || true
                          fi
                        }
                        trap cleanup_pf RETURN

                        kubectl -n "${ns}" port-forward "svc/${service_name}" "${local_port}:80" >/tmp/pf-${ns}.log 2>&1 &
                        pf_pid=$!
                        sleep 4
                        if ! kill -0 "${pf_pid}" >/dev/null 2>&1; then
                          echo "ERROR: port-forward failed for ${ns}/${service_name}"
                          cat /tmp/pf-${ns}.log || true
                          return 1
                        fi

                        local api_base="http://127.0.0.1:${local_port}/api/v1"
                        local smoke_email="smoke.admin.${ns}@energypredictapp.com"
                        local smoke_password="SmokePass!123"

                        curl -fsS "${api_base}/health/live" >/dev/null
                        curl -fsS "${api_base}/health/ready" >/dev/null

                        curl -sS -o /tmp/smoke-register-${ns}.json -w "%{http_code}" \
                          -X POST "${api_base}/auth/register" \
                          -H "Content-Type: application/json" \
                          -d "{\"email\":\"${smoke_email}\",\"password\":\"${smoke_password}\",\"role\":\"admin\"}" | grep -Eq "^(200|201|400|409)$"

                        curl -fsS -o /tmp/smoke-login-${ns}.json \
                          -X POST "${api_base}/auth/login" \
                          -H "Content-Type: application/x-www-form-urlencoded" \
                          --data-urlencode "username=${smoke_email}" \
                          --data-urlencode "password=${smoke_password}"

                        local token
                        token="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8")).get("access_token",""))' "/tmp/smoke-login-${ns}.json")"
                        if [ -z "${token}" ]; then
                          echo "ERROR: smoke login did not return access_token"
                          cat /tmp/smoke-login-${ns}.json || true
                          return 1
                        fi

                        curl -fsS -H "Authorization: Bearer ${token}" "${api_base}/admin/risk-thresholds" >/dev/null
                        curl -fsS -H "Authorization: Bearer ${token}" "${api_base}/admin/simulation/status" >/dev/null
                        curl -fsS -H "Authorization: Bearer ${token}" "${api_base}/stream/latest?limit=5" >/dev/null
                        curl -fsS -H "Authorization: Bearer ${token}" "${api_base}/alerts/active?limit=5" >/dev/null

                        echo "Smoke tests passed for namespace ${ns}"
                      }

                      PROD_UAMI_ID="$(az identity list --query "[?clientId=='$(AKS_WORKLOAD_IDENTITY_CLIENT_ID_PROD)'] | [0].id" -o tsv)"
                      if [ -z "${PROD_UAMI_ID}" ]; then
                        echo "ERROR: AKS_WORKLOAD_IDENTITY_CLIENT_ID_PROD ($(AKS_WORKLOAD_IDENTITY_CLIENT_ID_PROD)) not found in this subscription/tenant."
                        echo "Update Variable Group 'energypredict-shared' with the current Terraform output identity_client_id for prod."
                        exit 1
                      fi
                      echo "Using workload identity (prod): ${PROD_UAMI_ID}"

                      for f in k8s/overlays/prod/patch-serviceaccount*.yaml; do
                        sed -i "s|REPLACE_ME_CLIENT_ID|$(AKS_WORKLOAD_IDENTITY_CLIENT_ID_PROD)|g" "$f"
                      done
                      sed -i "s|REPLACE_ME_CLIENT_ID|$(AKS_WORKLOAD_IDENTITY_CLIENT_ID_PROD)|g" k8s/overlays/prod/patch-secretproviderclass.yaml
                      sed -i "s|REPLACE_ME_KEYVAULT_NAME|$(KEY_VAULT_NAME_PROD)|g" k8s/overlays/prod/patch-secretproviderclass.yaml
                      sed -i "s|REPLACE_ME_TENANT_ID|$(AZURE_TENANT_ID)|g" k8s/overlays/prod/patch-secretproviderclass.yaml
                      wait_for_cluster_api() {
                        local fqdn="$1"
                        local max_attempts="${2:-18}"
                        local sleep_seconds="${3:-10}"
                        local attempt=1
                        while [ "${attempt}" -le "${max_attempts}" ]; do
                          if kubectl version --request-timeout=15s >/dev/null 2>&1; then
                            echo "AKS API reachable."
                            return 0
                          fi
                          echo "Waiting for AKS API connectivity (${attempt}/${max_attempts})..."
                          if [ -n "${fqdn}" ]; then
                            getent hosts "${fqdn}" || true
                          fi
                          sleep "${sleep_seconds}"
                          attempt=$((attempt + 1))
                        done
                        return 1
                      }

                      apply_overlay_with_retry() {
                        local overlay="$1"
                        local max_attempts="${2:-6}"
                        local sleep_seconds="${3:-15}"
                        local attempt=1
                        while [ "${attempt}" -le "${max_attempts}" ]; do
                          echo "Applying ${overlay} (${attempt}/${max_attempts})..."
                          if kubectl apply --validate=false -k "${overlay}"; then
                            return 0
                          fi
                          sleep "${sleep_seconds}"
                          attempt=$((attempt + 1))
                        done
                        return 1
                      }

                      az aks get-credentials --resource-group $(AKS_PROD_RESOURCE_GROUP) --name $(AKS_PROD_CLUSTER_NAME) --overwrite-existing
                      PROD_AKS_FQDN="$(az aks show --resource-group $(AKS_PROD_RESOURCE_GROUP) --name $(AKS_PROD_CLUSTER_NAME) --query fqdn -o tsv 2>/dev/null || true)"
                      if ! wait_for_cluster_api "${PROD_AKS_FQDN}" 18 10; then
                        echo "ERROR: AKS API not reachable after retries (prod)."
                        exit 1
                      fi
                      if ! apply_overlay_with_retry "k8s/overlays/prod" 6 15; then
                        echo "ERROR: kubectl apply failed after retries (prod)."
                        debug_rollout "energypredict-prod" "energypredict-api-prod"
                        exit 1
                      fi
                      if [[ -z "${LETSENCRYPT_EMAIL:-}" ]]; then
                        echo "ERROR: LETSENCRYPT_EMAIL is empty in pipeline variables."
                        echo "Set LETSENCRYPT_EMAIL in Variable Group 'energypredict-shared'."
                        exit 1
                      fi
                      if ! timeout 35m env ENABLE_HTTPS=true LETSENCRYPT_EMAIL='$(LETSENCRYPT_EMAIL)' INGRESS_NGINX_REPLICA_COUNT="${INGRESS_NGINX_REPLICA_COUNT_PROD:-2}" bash scripts/prepare_public_api_endpoint.sh prod; then
                        echo "ERROR: prepare_public_api_endpoint.sh failed or timed out in prod."
                        debug_public_endpoint
                        exit 1
                      fi
                      API_IMAGE="$(ACR_NAME).azurecr.io/$(IMAGE_NAME):$(Build.SourceVersion)"
                      TRAINING_IMAGE="$(ACR_NAME).azurecr.io/$(TRAINING_IMAGE_NAME):$(Build.SourceVersion)"
                      DATA_PROCESSOR_IMAGE="$(ACR_NAME).azurecr.io/$(DATA_PROCESSOR_IMAGE_NAME):$(Build.SourceVersion)"
                      kubectl set image deployment/energypredict-api-prod api="${API_IMAGE}" -n energypredict-prod
                      kubectl set image deployment/energypredict-data-processor-prod data-processor="${DATA_PROCESSOR_IMAGE}" -n energypredict-prod
                      kubectl set image job/energypredict-training-template-prod training="${TRAINING_IMAGE}" -n energypredict-prod || true
                      kubectl set image cronjob/energypredict-drift-monitor-prod drift-monitor="${API_IMAGE}" -n energypredict-prod || true
                      PROD_EVENTHUB_FQ_NAMESPACE=""
                      if [ -n "${EVENTHUB_NAMESPACE_NAME_PROD:-}" ]; then
                        PROD_EVENTHUB_FQ_NAMESPACE="${EVENTHUB_NAMESPACE_NAME_PROD}.servicebus.windows.net"
                      fi
                      if [ -z "${MODEL_STORAGE_ACCOUNT_NAME_PROD:-}" ]; then
                        echo "ERROR: MODEL_STORAGE_ACCOUNT_NAME_PROD is required for cloud model artifacts/cache."
                        echo "Set it from Terraform output 'model_storage_account_name' in Variable Group 'energypredict-shared'."
                        exit 1
                      fi
                      if [ -z "${DATABRICKS_HOST_PROD:-}" ]; then
                        echo "ERROR: DATABRICKS_HOST_PROD is required for Databricks MLflow tracking."
                        echo "Example: https://adb-<workspace-id>.<region>.azuredatabricks.net"
                        exit 1
                      fi
                      kubectl set env configmap/energypredict-config-prod \
                        MLFLOW_TRACKING_URI=databricks \
                        MLFLOW_REGISTRY_URI=databricks-uc \
                        MLFLOW_REGISTER_MODEL=true \
                        MLFLOW_UC_CATALOG="${DATABRICKS_UC_CATALOG_PROD:-energypredict}" \
                        MLFLOW_UC_SCHEMA="${DATABRICKS_UC_SCHEMA_PROD:-mlops}" \
                        MLFLOW_REGISTERED_MODEL_NAME="${DATABRICKS_UC_MODEL_NAME_PROD:-energypredict.mlops.asset_failure_classifier}" \
                        MLFLOW_SYNC_PRODUCTION_ALIAS="${MLFLOW_SYNC_PRODUCTION_ALIAS_PROD:-false}" \
                        MLFLOW_PRODUCTION_ALIAS="${MLFLOW_PRODUCTION_ALIAS_PROD:-champion}" \
                        STREAM_INGESTION_ENABLED="${STREAM_INGESTION_ENABLED_PROD:-false}" \
                        API_SIMULATION_WORKER_ENABLED="${API_SIMULATION_WORKER_ENABLED_PROD:-false}" \
                        DRIFT_MONITOR_WINDOW_HOURS="${DRIFT_MONITOR_WINDOW_HOURS_PROD:-24}" \
                        DRIFT_MONITOR_MIN_SAMPLES="${DRIFT_MONITOR_MIN_SAMPLES_PROD:-30}" \
                        DRIFT_PSI_WARNING_THRESHOLD="${DRIFT_PSI_WARNING_THRESHOLD_PROD:-0.10}" \
                        DRIFT_PSI_RETRAIN_THRESHOLD="${DRIFT_PSI_RETRAIN_THRESHOLD_PROD:-0.25}" \
                        DRIFT_RETRAINING_ENABLED="${DRIFT_RETRAINING_ENABLED_PROD:-false}" \
                        DRIFT_RETRAINING_DATASET_URI="${DRIFT_RETRAINING_DATASET_URI_PROD:-azureblob://processed/latest/sensor_data.csv}" \
                        DRIFT_ALERT_WEBHOOK_URL="${DRIFT_ALERT_WEBHOOK_URL_PROD:-}" \
                        DATABRICKS_HOST="${DATABRICKS_HOST_PROD}" \
                        -n energypredict-prod
                      kubectl set env deployment/energypredict-api-prod \
                        CORS_ALLOWED_ORIGINS=$(CORS_ALLOWED_ORIGINS_PROD) \
                        STREAM_INGESTION_ENABLED="${STREAM_INGESTION_ENABLED_PROD:-false}" \
                        API_SIMULATION_WORKER_ENABLED="${API_SIMULATION_WORKER_ENABLED_PROD:-false}" \
                        PREDICTION_LOOP_INTERVAL_SECONDS="${PREDICTION_LOOP_INTERVAL_SECONDS:-10}" \
                        EVENTHUB_NAME="${EVENTHUB_NAME_PROD:-}" \
                        EVENTHUB_CONSUMER_GROUP="${EVENTHUB_CONSUMER_GROUP:-\$Default}" \
                        EVENTHUB_FQ_NAMESPACE=${PROD_EVENTHUB_FQ_NAMESPACE} \
                        MODEL_REGISTRY_BACKEND=blob \
                        MODEL_ARTIFACT_BACKEND=blob \
                        K8S_TRAINING_JOB_IMAGE="${TRAINING_IMAGE}" \
                        MLFLOW_TRACKING_URI=databricks \
                        MLFLOW_REGISTRY_URI=databricks-uc \
                        MLFLOW_REGISTER_MODEL=true \
                        MLFLOW_UC_CATALOG="${DATABRICKS_UC_CATALOG_PROD:-energypredict}" \
                        MLFLOW_UC_SCHEMA="${DATABRICKS_UC_SCHEMA_PROD:-mlops}" \
                        MLFLOW_REGISTERED_MODEL_NAME="${DATABRICKS_UC_MODEL_NAME_PROD:-energypredict.mlops.asset_failure_classifier}" \
                        DATABRICKS_HOST="${DATABRICKS_HOST_PROD}" \
                        LLM_PROVIDER="${LLM_PROVIDER:-disabled}" \
                        LLM_MODEL="${LLM_MODEL:-}" \
                        LLM_ENDPOINT="${LLM_ENDPOINT:-}" \
                        LLM_API_KEY="${LLM_API_KEY:-}" \
                        -n energypredict-prod
                      kubectl set env deployment/energypredict-data-processor-prod \
                        EVENTHUB_NAME="${EVENTHUB_NAME_PROD:-}" \
                        EVENTHUB_CONSUMER_GROUP="${EVENTHUB_CONSUMER_GROUP:-\$Default}" \
                        EVENTHUB_FQ_NAMESPACE=${PROD_EVENTHUB_FQ_NAMESPACE} \
                        MODEL_REGISTRY_BACKEND=blob \
                        MODEL_ARTIFACT_BACKEND=blob \
                        MLFLOW_TRACKING_URI=databricks \
                        MLFLOW_REGISTRY_URI=databricks-uc \
                        MLFLOW_REGISTER_MODEL=true \
                        MLFLOW_UC_CATALOG="${DATABRICKS_UC_CATALOG_PROD:-energypredict}" \
                        MLFLOW_UC_SCHEMA="${DATABRICKS_UC_SCHEMA_PROD:-mlops}" \
                        MLFLOW_REGISTERED_MODEL_NAME="${DATABRICKS_UC_MODEL_NAME_PROD:-energypredict.mlops.asset_failure_classifier}" \
